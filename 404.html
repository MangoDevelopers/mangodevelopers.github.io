    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --green: #00ff41;
            --green-dim: #00b32e;
            --green-dark: #003b10;
            --head: #cefbe4;
            --bg: #000000;
            --mono: 'Courier New', Courier, 'SF Mono', Menlo, Consolas, monospace;
        }

        html,
        body {
            height: 100%;
        }

        body {
            background: var(--bg);
            font-family: var(--mono);
            color: var(--green);
            overflow: hidden;
        }

        #rain {
            position: fixed;
            inset: 0;
            display: block;
        }

        /* ---------- CRT overlay: scanlines + vignette + flicker ---------- */
        .crt {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 5;
            background:
                repeating-linear-gradient(0deg,
                    rgba(0, 0, 0, .22) 0px,
                    rgba(0, 0, 0, .22) 1px,
                    transparent 1px,
                    transparent 3px),
                radial-gradient(ellipse at center,
                    transparent 55%,
                    rgba(0, 0, 0, .55) 100%);
        }

        .crt::after {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(18, 59, 29, .04);
            animation: flicker 4s infinite;
        }

        @keyframes flicker {

            0%,
            100% {
                opacity: .9;
            }

            3% {
                opacity: .6;
            }

            6% {
                opacity: 1;
            }

            52% {
                opacity: .8;
            }

            54% {
                opacity: 1;
            }
        }

        /* ---------- centre stage ---------- */
        .stage {
            position: fixed;
            inset: 0;
            z-index: 3;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 1.5rem;
            transition: background 1.2s;
        }

        /* dim the rain behind the content once the pills appear */
        .stage.revealed {
            background: radial-gradient(ellipse 62% 55% at 50% 50%,
                    rgba(0, 0, 0, .88) 30%,
                    rgba(0, 0, 0, .55) 60%,
                    transparent 78%);
        }

        .typeline {
            font-size: clamp(1.4rem, 4.2vw, 2.6rem);
            letter-spacing: .06em;
            color: var(--green);
            text-shadow: 0 0 8px rgba(0, 255, 65, .8), 0 0 24px rgba(0, 255, 65, .35);
            min-height: 1.5em;
            white-space: pre-wrap;
        }

        .typeline .caret {
            display: inline-block;
            width: .55em;
            height: 1.1em;
            margin-left: .12em;
            vertical-align: text-bottom;
            background: var(--green);
            box-shadow: 0 0 10px rgba(0, 255, 65, .9);
            animation: blink 1s steps(1) infinite;
        }

        @keyframes blink {
            50% {
                opacity: 0;
            }
        }

        /* error block, revealed after the cold open */
        .error-block {
            margin-top: 2rem;
            font-size: clamp(.8rem, 2vw, 1rem);
            color: var(--green-dim);
            text-shadow: 0 0 6px rgba(0, 255, 65, .4);
            opacity: 0;
            transition: opacity 1s;
        }

        .error-block .path {
            color: var(--green);
        }

        /* ---------- the pills ---------- */
        .pills {
            display: flex;
            gap: 1.25rem;
            flex-wrap: wrap;
            justify-content: center;
            margin-top: 2.5rem;
            opacity: 0;
            transform: translateY(10px);
            transition: opacity 1s, transform 1s;
        }

        .revealed .pills {
            opacity: 1;
            transform: none;
        }

        .revealed .error-block {
            opacity: 1;
        }

        .pill {
            display: inline-flex;
            align-items: center;
            gap: .7rem;
            font-family: var(--mono);
            font-size: 1rem;
            letter-spacing: .04em;
            text-decoration: none;
            padding: .8rem 1.6rem;
            border-radius: 8rem;
            border: 1px solid;
            background: rgba(0, 0, 0, .82);
            transition: box-shadow .25s, transform .15s, background-color .25s;
        }

        .pill:hover {
            transform: translateY(-2px);
        }

        .pill-dot {
            width: 1.05rem;
            height: 1.05rem;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .pill.red {
            color: #ff8686;
            border-color: #b3202033;
        }

        .pill.red .pill-dot {
            background: radial-gradient(circle at 32% 28%, #ff9d9d, #e01c1c 55%, #6e0000);
            box-shadow: 0 0 14px rgba(255, 40, 40, .8);
        }

        .pill.red:hover {
            box-shadow: 0 0 24px rgba(255, 40, 40, .35);
            background: rgba(40, 0, 0, .55);
        }

        .pill.blue {
            color: #9ecbff;
            border-color: #1e5db333;
        }

        .pill.blue .pill-dot {
            background: radial-gradient(circle at 32% 28%, #aad4ff, #1e63d0 55%, #002a6e);
            box-shadow: 0 0 14px rgba(60, 140, 255, .8);
        }

        .pill.blue:hover {
            box-shadow: 0 0 24px rgba(60, 140, 255, .35);
            background: rgba(0, 10, 40, .55);
        }

        .operator {
            margin-top: 1.75rem;
            font-size: .85rem;
            color: var(--green-dim);
            opacity: 0;
            transition: opacity 1s .4s;
        }

        .revealed .operator {
            opacity: 1;
        }

        .operator a {
            color: var(--green);
            text-decoration: underline;
        }

        .operator a:hover {
            text-shadow: 0 0 8px rgba(0, 255, 65, .8);
        }

        .skip-hint {
            position: fixed;
            top: 1rem;
            right: 1.25rem;
            z-index: 4;
            font-size: .75rem;
            color: var(--green-dark);
            letter-spacing: .08em;
        }

        /* ---------- footer: social + credit ---------- */
        .foot {
            position: fixed;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 4;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
            gap: 1.1rem;
            padding: 1rem 1.5rem;
            font-size: .8rem;
            color: var(--green-dim);
        }

        .foot-social {
            display: flex;
            gap: .7rem;
        }

        .foot-social a {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 2.1rem;
            height: 2.1rem;
            border-radius: 50%;
            border: 1px solid var(--green-dark);
            color: var(--green-dim);
            transition: color .2s, border-color .2s, box-shadow .2s;
        }

        .foot-social a:hover {
            color: var(--green);
            border-color: var(--green);
            box-shadow: 0 0 12px rgba(0, 255, 65, .35);
        }

        .foot-social svg {
            width: .95rem;
            height: .95rem;
        }

        .foot a.credit {
            color: var(--green);
            text-decoration: none;
        }

        .foot a.credit:hover {
            text-shadow: 0 0 8px rgba(0, 255, 65, .8);
        }

        @media (prefers-reduced-motion: reduce) {

            .crt::after,
            .typeline .caret {
                animation: none;
            }

            .pills,
            .error-block,
            .operator {
                transition: none;
            }
        }
    </style>

    <script>
        (function () {
            var reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

            /* ============================================================
               Digital rain — film-style: black canvas, green glyph trails,
               pale leading glyph, occasional in-place mutation. The cursor
               energises nearby columns; clicks fire a glitch pulse.
               ============================================================ */
            var canvas = document.getElementById('rain');
            var ctx = canvas.getContext('2d');
            var GLYPHS = 'ｦｧｨｩｪｫｬｭｮｯｰｱｲｳｴｵｶｷｸｹｺｻｼｽｾｿﾀﾁﾂﾃﾄﾅﾆﾇﾈﾉﾊﾋﾌﾍﾎﾏﾐﾑﾒﾓﾔﾕﾖﾗﾘﾙﾚﾛﾜﾝ0123456789Z:・."=*+-<>¦｜';
            var CELL = 18;
            var cols = 0, drops = [], speeds = [], headGlyph = [], lastRow = [];
            var mouse = { x: -1e4, y: -1e4 };
            var glitchUntil = 0;

            function rndGlyph() {
                return GLYPHS[Math.floor(Math.random() * GLYPHS.length)];
            }

            function resize() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
                cols = Math.ceil(canvas.width / CELL);
                drops = [];
                speeds = [];
                headGlyph = [];
                lastRow = [];
                for (var i = 0; i < cols; i++) {
                    drops.push(Math.random() * canvas.height / CELL);
                    speeds.push(.07 + Math.random() * .15);
                    headGlyph.push(rndGlyph());
                    lastRow.push(Math.floor(drops[i]));
                }
                ctx.fillStyle = '#000';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
            }

            function drawRain() {
                // trail fade
                ctx.fillStyle = 'rgba(0, 0, 0, 0.045)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.font = CELL + 'px monospace';
                ctx.textBaseline = 'top';

                for (var i = 0; i < cols; i++) {
                    var x = i * CELL;
                    var row = Math.floor(drops[i]);

                    // cursor energy: nearby columns run hot and bright
                    var near = Math.abs(x - mouse.x) < 120;
                    var boost = near ? 1.8 : 1;

                    // when the head advances a row, stamp the old head into
                    // the green trail once and pick a fresh glyph
                    if (row !== lastRow[i]) {
                        ctx.fillStyle = near ? '#39ff6f' : '#00ff41';
                        ctx.fillText(headGlyph[i], x, lastRow[i] * CELL);
                        headGlyph[i] = rndGlyph();
                        lastRow[i] = row;
                    }

                    // pale leading glyph, kept bright while it dwells
                    ctx.fillStyle = near ? '#eafff2' : '#cefbe4';
                    ctx.fillText(headGlyph[i], x, row * CELL);

                    drops[i] += speeds[i] * boost;
                    if (row * CELL > canvas.height && Math.random() > 0.976) {
                        drops[i] = 0;
                        lastRow[i] = 0;
                        speeds[i] = .07 + Math.random() * .15;
                    }
                }

                // random in-place mutations (the rain "computes")
                ctx.fillStyle = '#00b32e';
                for (var m = 0; m < 12; m++) {
                    ctx.fillText(rndGlyph(),
                        Math.floor(Math.random() * cols) * CELL,
                        Math.floor(Math.random() * (canvas.height / CELL)) * CELL);
                }

                // glitch pulse: slice the frame and shove rows sideways
                if (performance.now() < glitchUntil) {
                    for (var g = 0; g < 7; g++) {
                        var sy = Math.random() * canvas.height;
                        var sh = 6 + Math.random() * 30;
                        var dx = (Math.random() - .5) * 90;
                        ctx.drawImage(canvas, 0, sy, canvas.width, sh, dx, sy, canvas.width, sh);
                    }
                }
            }

            function loop() {
                requestAnimationFrame(loop);
                drawRain();
            }

            window.addEventListener('mousemove', function (e) {
                mouse.x = e.clientX;
                mouse.y = e.clientY;
            });
            window.addEventListener('mouseout', function () {
                mouse.x = -1e4;
            });
            window.addEventListener('click', function (e) {
                if (e.target.closest('a')) return;
                glitchUntil = performance.now() + 380;
            });

            var resizeTimer;
            window.addEventListener('resize', function () {
                clearTimeout(resizeTimer);
                resizeTimer = setTimeout(resize, 120);
            });

            resize();
            if (reduceMotion) {
                // a single quiet frame — no animation
                for (var f = 0; f < 160; f++) drawRain();
            } else {
                loop();
            }

            /* ============================================================
               The cold open — lines type out one at a time, then the
               404 block, pills and operator line fade in.
               ============================================================ */
            var typed = document.getElementById('typed');
            var stage = document.getElementById('stage');
            var skipHint = document.getElementById('skip-hint');

            var lostPath = location.pathname || '/unknown';
            try { lostPath = decodeURIComponent(lostPath); } catch (err) { /* keep raw */ }
            document.getElementById('lost-path').textContent = lostPath;

            var SCRIPT = [
                { text: 'Wake up, Neo...', hold: 1600 },
                { text: 'You took a wrong turn...', hold: 1500 },
                { text: 'This page does not exist in the Matrix.', hold: 900 }
            ];
            var si = 0, ci = 0, done = false;
            var timer = null;

            function reveal() {
                if (done) return;
                done = true;
                clearTimeout(timer);
                typed.textContent = SCRIPT[SCRIPT.length - 1].text;
                stage.classList.add('revealed');
                skipHint.style.display = 'none';
            }

            function typeStep() {
                if (done) return;
                var line = SCRIPT[si];
                if (ci <= line.text.length) {
                    typed.textContent = line.text.slice(0, ci);
                    ci++;
                    timer = setTimeout(typeStep, 65 + Math.random() * 55);
                } else {
                    timer = setTimeout(function () {
                        si++;
                        ci = 0;
                        if (si >= SCRIPT.length) {
                            reveal();
                        } else {
                            typed.textContent = '';
                            timer = setTimeout(typeStep, 350);
                        }
                    }, line.hold);
                }
            }

            if (reduceMotion) {
                reveal();
            } else {
                timer = setTimeout(typeStep, 1200);
                // skippable, like any good intro
                window.addEventListener('keydown', reveal);
                window.addEventListener('click', function (e) {
                    if (!e.target.closest('a')) reveal();
                });
            }
        })();
    </script>
