<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex">
    <title>404 — Lost in Space | Mango Developers</title>

    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-QVE8EH4YDB"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag() { dataLayer.push(arguments); }
        gtag('js', new Date());
        gtag('config', 'G-QVE8EH4YDB');
    </script>

    <link rel="icon" type="image/png" href="/assets/images/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="/assets/images/favicon.svg" />
    <link rel="apple-touch-icon" sizes="180x180" href="/assets/images/apple-touch-icon.png" />

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #0b0f1a;
            --ink: #e8ecf4;
            --ink-60: #e8ecf499;
            --mango-a: #ffc837;
            --mango-b: #ff8008;
            --leaf: #58c26a;
            --accent: #7ddcff;
            --mono: 'SF Mono', Menlo, Consolas, 'Liberation Mono', monospace;
            --sans: -apple-system, BlinkMacSystemFont, Inter, 'Segoe UI', sans-serif;
        }

        html,
        body {
            height: 100%;
        }

        body {
            font-family: var(--sans);
            background: radial-gradient(ellipse at 50% 120%, #16203a 0%, var(--bg) 60%);
            color: var(--ink);
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .scene {
            position: fixed;
            inset: 0;
        }

        .scene svg {
            width: 100%;
            height: 100%;
            display: block;
        }

        .content {
            position: relative;
            z-index: 2;
            text-align: center;
            padding: 1.5rem;
            max-width: 40rem;
            /* let clicks fall through to the SVG scene except on real controls */
            pointer-events: none;
        }

        .content a,
        .content .terminal {
            pointer-events: auto;
        }

        .digits {
            font-size: clamp(6rem, 20vw, 11rem);
            font-weight: 800;
            line-height: 1;
            letter-spacing: -.04em;
            user-select: none;
        }

        .digits span {
            display: inline-block;
            background: linear-gradient(135deg, var(--mango-a), var(--mango-b));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            animation: float-digit 4s ease-in-out infinite;
        }

        .digits span:nth-child(2) {
            animation-delay: .6s;
        }

        .digits span:nth-child(3) {
            animation-delay: 1.2s;
        }

        @keyframes float-digit {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-.08em);
            }
        }

        h1 {
            font-size: clamp(1.3rem, 3.5vw, 1.75rem);
            font-weight: 600;
            margin-top: .5rem;
        }

        .terminal {
            display: inline-block;
            font-family: var(--mono);
            font-size: .85rem;
            color: var(--ink-60);
            background: #ffffff0d;
            border: 1px solid #ffffff1a;
            border-radius: .6rem;
            padding: .55rem 1rem;
            margin-top: 1.1rem;
            max-width: 100%;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .terminal .prompt {
            color: var(--leaf);
        }

        .terminal .cursor {
            display: inline-block;
            width: .55em;
            background: var(--accent);
            color: transparent;
            animation: blink 1.1s steps(1) infinite;
        }

        @keyframes blink {
            50% {
                opacity: 0;
            }
        }

        .hint {
            margin-top: .9rem;
            font-size: .875rem;
            color: var(--ink-60);
        }

        .btns {
            display: flex;
            gap: .75rem;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 1.6rem;
        }

        .button {
            display: inline-flex;
            align-items: center;
            gap: .5rem;
            padding: .7rem 1.5rem;
            border-radius: 8rem;
            font-size: 1rem;
            font-weight: 500;
            text-decoration: none;
            border: 1px solid transparent;
            transition: transform .15s, background-color .2s, color .2s, border-color .2s;
        }

        .button:hover {
            transform: translateY(-2px);
        }

        .button.is-primary {
            background: linear-gradient(135deg, var(--mango-a), var(--mango-b));
            color: #221400;
        }

        .button.is-secondary {
            border-color: #ffffff40;
            color: var(--ink);
        }

        .button.is-secondary:hover {
            border-color: var(--ink);
        }

        /* ---------- SVG scene ---------- */
        .mango-group {
            cursor: pointer;
        }

        .mango-bob {
            animation: bob 5s ease-in-out infinite;
        }

        @keyframes bob {

            0%,
            100% {
                transform: translateY(0) rotate(-3deg);
            }

            50% {
                transform: translateY(-14px) rotate(3deg);
            }
        }

        .mango-spin {
            animation: spin-squash .7s cubic-bezier(.36, .07, .19, .97);
            transform-origin: center;
            transform-box: fill-box;
        }

        @keyframes spin-squash {
            0% {
                transform: rotate(0) scale(1);
            }

            35% {
                transform: rotate(180deg) scale(1.15, .85);
            }

            70% {
                transform: rotate(340deg) scale(.9, 1.1);
            }

            100% {
                transform: rotate(360deg) scale(1);
            }
        }

        .star {
            fill: #fff;
            animation: twinkle 3s ease-in-out infinite;
        }

        @keyframes twinkle {

            0%,
            100% {
                opacity: .25;
            }

            50% {
                opacity: 1;
            }
        }

        .orbit-ring {
            fill: none;
            stroke: #ffffff14;
            stroke-dasharray: 4 7;
            animation: orbit-rotate 60s linear infinite;
            transform-origin: center;
            transform-box: fill-box;
        }

        @keyframes orbit-rotate {
            to {
                transform: rotate(360deg);
            }
        }

        .shooting {
            stroke: url(#shoot-grad);
            stroke-width: 2;
            stroke-linecap: round;
        }

        .eyelid {
            transform-origin: center;
            transform-box: fill-box;
        }

        .blinking .eyelid {
            animation: lid .18s ease-in-out;
        }

        @keyframes lid {
            50% {
                transform: scaleY(.05);
            }
        }

        @media (prefers-reduced-motion: reduce) {

            .mango-bob,
            .digits span,
            .star,
            .orbit-ring,
            .terminal .cursor {
                animation: none;
            }
        }
    </style>
</head>

<body>
    <div class="scene" aria-hidden="true">
        <svg id="space" viewBox="0 0 1200 800" preserveAspectRatio="xMidYMid slice">
            <defs>
                <radialGradient id="mango-skin" cx="35%" cy="30%" r="80%">
                    <stop offset="0%" stop-color="#ffd968" />
                    <stop offset="55%" stop-color="#ffb02e" />
                    <stop offset="100%" stop-color="#f07000" />
                </radialGradient>
                <linearGradient id="shoot-grad" x1="0" y1="0" x2="1" y2="0">
                    <stop offset="0%" stop-color="#fff" stop-opacity="0" />
                    <stop offset="100%" stop-color="#fff" />
                </linearGradient>
                <radialGradient id="glow" cx="50%" cy="50%" r="50%">
                    <stop offset="0%" stop-color="#ffb02e" stop-opacity=".18" />
                    <stop offset="100%" stop-color="#ffb02e" stop-opacity="0" />
                </radialGradient>
            </defs>

            <!-- parallax star layers (populated by JS) -->
            <g id="stars-far"></g>
            <g id="stars-mid"></g>
            <g id="stars-near"></g>

            <!-- planet on the horizon -->
            <g id="planet" transform="translate(950 660)">
                <circle r="150" fill="#141c30" />
                <circle r="150" fill="none" stroke="#ffffff10" stroke-width="2" />
                <ellipse class="orbit-ring" rx="215" ry="60" stroke-width="2" />
                <circle cx="-55" cy="-40" r="18" fill="#0d1322" />
                <circle cx="30" cy="20" r="28" fill="#0d1322" />
                <circle cx="80" cy="-70" r="12" fill="#0d1322" />
            </g>

            <!-- shooting stars land here (JS) -->
            <g id="shooters"></g>

            <!-- the lost mango -->
            <g id="mango" class="mango-group" transform="translate(240 250)">
                <circle r="150" fill="url(#glow)" />
                <g id="mango-inner" class="mango-bob">
                    <g id="mango-body">
                        <g transform="rotate(-8) scale(1.18 1)">
                        <!-- stem + leaf -->
                        <path d="M8 -78 q4 -18 18 -26" fill="none" stroke="#8a5a2b" stroke-width="7"
                            stroke-linecap="round" />
                        <path d="M26 -104 q34 -18 58 2 q-26 20 -58 10 q-4 -6 0 -12z" fill="var(--leaf)" />
                        <path d="M26 -104 q30 -8 52 6" fill="none" stroke="#2e7d3d" stroke-width="3"
                            stroke-linecap="round" />
                        <!-- body -->
                        <path d="M-2 -80
                                 C -62 -78 -92 -30 -86 18
                                 C -80 68 -36 96 6 92
                                 C 58 88 88 46 82 -6
                                 C 76 -52 44 -82 -2 -80 Z" fill="url(#mango-skin)" />
                        <!-- cheek blush -->
                        <ellipse cx="-46" cy="30" rx="13" ry="8" fill="#ff6b3d" opacity=".45" />
                        <ellipse cx="52" cy="26" rx="13" ry="8" fill="#ff6b3d" opacity=".45" />
                        <!-- eyes -->
                        <g id="eye-left">
                            <circle cx="-26" cy="0" r="17" fill="#fff" />
                            <circle class="pupil" cx="-26" cy="0" r="8" fill="#221400" />
                            <circle cx="-23" cy="-4" r="2.6" fill="#fff" />
                            <rect class="eyelid" x="-45" y="-19" width="38" height="38" rx="19"
                                fill="url(#mango-skin)" opacity="0" />
                        </g>
                        <g id="eye-right">
                            <circle cx="30" cy="0" r="17" fill="#fff" />
                            <circle class="pupil" cx="30" cy="0" r="8" fill="#221400" />
                            <circle cx="33" cy="-4" r="2.6" fill="#fff" />
                            <rect class="eyelid" x="11" y="-19" width="38" height="38" rx="19" fill="url(#mango-skin)"
                                opacity="0" />
                        </g>
                        <!-- mouth -->
                        <path id="mouth" d="M-10 38 q12 12 26 0" fill="none" stroke="#221400" stroke-width="4.5"
                            stroke-linecap="round" />
                        </g>
                    </g>
                </g>
            </g>

            <!-- burst particles land here (JS) -->
            <g id="burst"></g>
        </svg>
    </div>

    <main class="content">
        <div class="digits" aria-label="404"><span>4</span><span>0</span><span>4</span></div>
        <h1>This page drifted off into space.</h1>
        <div class="terminal"><span class="prompt">$</span> open <span id="lost-path">/unknown</span> — No such file
            or directory<span class="cursor">_</span></div>
        <p class="hint">Psst — try poking the mango.</p>
        <div class="btns">
            <a class="button is-primary" href="/">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M3 11l9-8 9 8" />
                    <path d="M5 10v10h14V10" />
                </svg>
                Take me home
            </a>
            <a class="button is-secondary" href="/apps/">View our apps</a>
        </div>
    </main>

    <script>
        (function () {
            var svg = document.getElementById('space');
            var reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
            var SVG_NS = 'http://www.w3.org/2000/svg';

            // Show the path that 404'd, terminal-style
            var lostPath = location.pathname || '/unknown';
            try { lostPath = decodeURIComponent(lostPath); } catch (e) { /* keep raw */ }
            document.getElementById('lost-path').textContent = lostPath;

            // ---------- star field ----------
            function makeStars(groupId, count, minR, maxR) {
                var g = document.getElementById(groupId);
                for (var i = 0; i < count; i++) {
                    var s = document.createElementNS(SVG_NS, 'circle');
                    s.setAttribute('class', 'star');
                    s.setAttribute('cx', Math.random() * 1200);
                    s.setAttribute('cy', Math.random() * 800);
                    s.setAttribute('r', (minR + Math.random() * (maxR - minR)).toFixed(2));
                    s.style.animationDelay = (Math.random() * 3).toFixed(2) + 's';
                    s.style.animationDuration = (2 + Math.random() * 3).toFixed(2) + 's';
                    g.appendChild(s);
                }
                return g;
            }
            var farStars = makeStars('stars-far', 70, .6, 1.1);
            var midStars = makeStars('stars-mid', 40, 1, 1.8);
            var nearStars = makeStars('stars-near', 18, 1.6, 2.6);

            // ---------- pointer tracking: parallax + eyes ----------
            var pupils = svg.querySelectorAll('.pupil');
            var mango = document.getElementById('mango');

            function onPoint(x, y) {
                var w = window.innerWidth, h = window.innerHeight;
                var nx = x / w - .5, ny = y / h - .5;

                if (!reduceMotion) {
                    farStars.setAttribute('transform', 'translate(' + (nx * -8) + ' ' + (ny * -8) + ')');
                    midStars.setAttribute('transform', 'translate(' + (nx * -18) + ' ' + (ny * -18) + ')');
                    nearStars.setAttribute('transform', 'translate(' + (nx * -32) + ' ' + (ny * -32) + ')');
                }

                // eyes look toward the pointer
                var rect = mango.getBoundingClientRect();
                var mx = rect.left + rect.width / 2, my = rect.top + rect.height / 2;
                var ang = Math.atan2(y - my, x - mx);
                var dist = Math.min(6, Math.hypot(x - mx, y - my) / 40);
                var dx = (Math.cos(ang) * dist).toFixed(1), dy = (Math.sin(ang) * dist).toFixed(1);
                pupils.forEach(function (p) {
                    p.setAttribute('transform', 'translate(' + dx + ' ' + dy + ')');
                });
            }

            window.addEventListener('mousemove', function (e) { onPoint(e.clientX, e.clientY); });
            window.addEventListener('touchmove', function (e) {
                if (e.touches.length) onPoint(e.touches[0].clientX, e.touches[0].clientY);
            }, { passive: true });

            // ---------- blinking ----------
            var inner = document.getElementById('mango-inner');
            var lids = svg.querySelectorAll('.eyelid');
            function blink() {
                lids.forEach(function (l) { l.setAttribute('opacity', 1); });
                inner.classList.add('blinking');
                setTimeout(function () {
                    lids.forEach(function (l) { l.setAttribute('opacity', 0); });
                    inner.classList.remove('blinking');
                }, 180);
                setTimeout(blink, 2500 + Math.random() * 4000);
            }
            if (!reduceMotion) setTimeout(blink, 1800);

            // ---------- click the mango: spin + starburst + grin ----------
            var body = document.getElementById('mango-body');
            var mouth = document.getElementById('mouth');
            var burst = document.getElementById('burst');
            var pokes = 0;

            mango.addEventListener('click', function () {
                pokes++;
                if (!reduceMotion) {
                    body.classList.remove('mango-spin');
                    void body.getBoundingClientRect(); // restart animation
                    body.classList.add('mango-spin');
                }
                mouth.setAttribute('d', pokes % 5 === 0
                    ? 'M-14 36 q17 20 34 0'   // big grin every 5th poke
                    : 'M-10 38 q12 12 26 0');

                // starburst
                var t = mango.getAttribute('transform'); // translate(x y)
                var m = /translate\(([\d.]+)[ ,]+([\d.]+)\)/.exec(t);
                var cx = m ? +m[1] : 240, cy = m ? +m[2] : 250;
                for (var i = 0; i < 10; i++) {
                    (function () {
                        var p = document.createElementNS(SVG_NS, 'circle');
                        var ang = (Math.PI * 2 * i) / 10 + Math.random() * .5;
                        var r = 2 + Math.random() * 3;
                        p.setAttribute('r', r);
                        p.setAttribute('cx', cx); p.setAttribute('cy', cy);
                        p.setAttribute('fill', i % 2 ? '#ffc837' : '#7ddcff');
                        p.style.transition = 'transform .8s cubic-bezier(.17,.67,.35,1), opacity .8s';
                        burst.appendChild(p);
                        requestAnimationFrame(function () {
                            requestAnimationFrame(function () {
                                var d = 90 + Math.random() * 70;
                                p.style.transform = 'translate(' + Math.cos(ang) * d + 'px,' + Math.sin(ang) * d + 'px)';
                                p.style.opacity = '0';
                            });
                        });
                        setTimeout(function () { p.remove(); }, 900);
                    })();
                }
                if (typeof gtag === 'function' && pokes === 1) {
                    gtag('event', 'mango_poked_404');
                }
            });

            // ---------- shooting stars ----------
            var shooters = document.getElementById('shooters');
            function shoot() {
                if (!reduceMotion && !document.hidden) {
                    var line = document.createElementNS(SVG_NS, 'line');
                    var x = 200 + Math.random() * 800, y = 40 + Math.random() * 250;
                    line.setAttribute('class', 'shooting');
                    line.setAttribute('x1', x); line.setAttribute('y1', y);
                    line.setAttribute('x2', x); line.setAttribute('y2', y);
                    line.style.transition = 'all 1s ease-out, opacity .4s ease-in 0.7s';
                    shooters.appendChild(line);
                    requestAnimationFrame(function () {
                        requestAnimationFrame(function () {
                            line.setAttribute('x1', x - 260); line.setAttribute('y1', y + 130);
                            line.setAttribute('x2', x - 180); line.setAttribute('y2', y + 90);
                            line.style.opacity = '0';
                        });
                    });
                    setTimeout(function () { line.remove(); }, 1200);
                }
                setTimeout(shoot, 2500 + Math.random() * 5000);
            }
            setTimeout(shoot, 1200);

            // ---------- arrow keys nudge the mango (it *is* a TV-app company) ----------
            var pos = { x: 240, y: 250 };
            window.addEventListener('keydown', function (e) {
                var step = 24;
                var moves = { ArrowLeft: [-step, 0], ArrowRight: [step, 0], ArrowUp: [0, -step], ArrowDown: [0, step] };
                if (!moves[e.key]) return;
                e.preventDefault();
                pos.x = Math.max(80, Math.min(1120, pos.x + moves[e.key][0]));
                pos.y = Math.max(120, Math.min(680, pos.y + moves[e.key][1]));
                mango.style.transition = 'all .25s ease-out';
                mango.setAttribute('transform', 'translate(' + pos.x + ' ' + pos.y + ')');
            });
        })();
    </script>
</body>

</html>
